# Companion Worker that HOSTS the Durable Object class.
#
# Cloudflare Pages cannot define a Durable Object class itself — the class must
# live in a Worker and be referenced from Pages via `script_name`. Deploy this
# Worker first (`npm run worker:deploy`), then deploy Pages.

name = "vanish-room"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDurableObject"

[[migrations]]
tag = "v1"
# SQLite-backed Durable Objects are required on the Cloudflare free plan (and
# are the recommended default). The storage KV + alarms API used by
# RoomDurableObject works unchanged on SQLite-backed namespaces.
new_sqlite_classes = ["RoomDurableObject"]

# Encrypted media blobs. Only ciphertext is ever written here.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "vanish-media"

# ---------------------------------------------------------------------------
# Web Push (VAPID). Required for background notifications that fire even when
# the app is fully closed. Generate a key pair once:
#
#   npx web-push generate-vapid-keys
#
# Then set them as secrets on THIS worker (do not commit them):
#
#   npx wrangler secret put VAPID_PUBLIC_KEY
#   npx wrangler secret put VAPID_PRIVATE_KEY
#   npx wrangler secret put VAPID_SUBJECT      # e.g. mailto:you@example.com
#
# The Pages project also needs VAPID_PUBLIC_KEY (same value) so the client can
# subscribe:  npx wrangler pages secret put VAPID_PUBLIC_KEY --project-name vanish
#
# When these are unset, push fan-out is silently disabled and Vanish falls back
# to in-app + background-tab notifications only.
# ---------------------------------------------------------------------------
